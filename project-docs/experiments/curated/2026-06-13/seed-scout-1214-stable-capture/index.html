<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stable Natural Seed Capture</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f4;
        color: #1f2720;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 24px 44px;
      }

      header {
        display: grid;
        gap: 10px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #526056;
        line-height: 1.55;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 4px;
      }

      .pill {
        border: 1px solid #cdd6cc;
        border-radius: 999px;
        padding: 6px 10px;
        background: #ffffff;
        font-size: 13px;
        color: #334037;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        border: 1px solid #d8ddd4;
        background: #ffffff;
        border-radius: 8px;
        overflow: hidden;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        background: #dde8ef;
      }

      figcaption {
        padding: 12px 14px 14px;
        font-size: 14px;
        color: #415045;
      }

      @media (max-width: 820px) {
        main {
          padding: 22px 16px 34px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Stable Natural Seed Capture</h1>
        <p>
          Seed 9137002542963915989 captured from fresh 1.21.4 worlds so the
          server version matches prismarine-viewer support exactly.
        </p>
        <div class="meta">
          <span class="pill">scenario: natural-safe-spawn-v1</span>
          <span class="pill">setup: passed</span>
          <span class="pill">natural validation: passed</span>
          <span class="pill">provider requests: 0</span>
        </div>
      </header>

      <section class="grid">
        <figure>
          <img
            src="first-person/screenshots/cycle-0001-cycle-end.png"
            alt="First-person capture of a natural birch and oak forest near water"
          />
          <figcaption>First-person: nearby birch/oak, shallow water, ordinary forest edge.</figcaption>
        </figure>
        <figure>
          <img
            src="third-person/screenshots/cycle-0001-cycle-end.png"
            alt="Third-person overhead capture of forest, coast, and water"
          />
          <figcaption>Third-person: forest/coast overview without the previous redstone-like mismatch.</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
